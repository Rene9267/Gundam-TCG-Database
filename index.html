<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gundam Collection Database</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2c52b3',
            secondary: '#5a5b6d',
            accent: '#fff867',
            danger: '#fb2f38',
            surface: '#f8fafc',
            'primary-light': '#e8edf7',
            'secondary-light': '#eef0f4',
          }
        },
        fontFamily: {
          'heading': ['Space Grotesk', 'sans-serif'],
          'body': ['Inter', 'sans-serif'],
          'mono': ['JetBrains Mono', 'monospace'],
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body class="font-body text-primary bg-surface min-h-screen">

  <!-- ============ SPLASH / LOGIN ============ -->
  <div id="splash-section" class="min-h-screen flex items-center justify-center px-4 bg-[#5a5b6d]">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <h1 class="text-5xl font-bold tracking-wider text-accent" style="text-shadow: 0 2px 8px rgba(234,179,8,0.3);">GUNDAM</h1>
        <p class="text-white/80 text-lg font-semibold -mt-1">CARD COLLECTION</p>
      </div>

      <!-- Auth form -->
      <div id="auth-form" class="bg-white rounded-2xl shadow-lg border border-white/10 p-6">
        <div class="flex mb-5 bg-[#eef0f4] rounded-lg p-1">
          <button id="auth-login-tab" class="auth-tab active flex-1 py-2 text-sm font-semibold rounded-md">Accedi</button>
          <button id="auth-register-tab" class="auth-tab flex-1 py-2 text-sm font-semibold rounded-md">Registrati</button>
        </div>

        <div id="auth-fields">
          <input id="auth-email" type="email" placeholder="Email" autocomplete="email"
            class="w-full bg-[#f8fafc] border border-[#e2e8f0] rounded-lg px-4 py-3 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary placeholder-[#94a3b8]">
          <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password"
            class="w-full bg-[#f8fafc] border border-[#e2e8f0] rounded-lg px-4 py-3 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary placeholder-[#94a3b8]">
        </div>

        <button id="auth-submit" class="w-full bg-[#2c52b3] hover:bg-[#1e3a7a] text-white text-base font-bold py-3 rounded-full shadow-sm transition hover:scale-[1.02] active:scale-95">
          Accedi
        </button>

        <p id="auth-error" class="text-[#fb2f38] text-sm mt-3 text-center hidden"></p>
        <p id="auth-loading" class="text-[#5a5b6d] text-sm mt-3 text-center hidden">Connessione...</p>
      </div>

      <!-- Already logged in state -->
      <div id="auth-authed" class="hidden bg-white rounded-2xl shadow-lg border border-white/10 p-6 text-center">
        <div class="w-14 h-14 rounded-full bg-[#eef0f4] flex items-center justify-center mx-auto mb-3">
          <span class="material-symbols-outlined text-[#2c52b3]" style="font-size:32px">account_circle</span>
        </div>
        <p id="auth-user-email" class="text-[#2c52b3] font-semibold text-sm mb-1"></p>
        <p class="text-[#5a5b6d] text-xs mb-4">Sei connesso</p>
        <button id="auth-start" class="w-full bg-[#2c52b3] hover:bg-[#1e3a7a] text-white text-base font-bold py-3 rounded-full shadow-sm transition hover:scale-[1.02] active:scale-95">
          Entra nella Collezione
        </button>
        <button id="auth-logout" class="mt-3 text-sm text-[#5a5b6d] hover:text-[#2c52b3] transition font-medium">
          Esci
        </button>
      </div>

      <p id="splash-error" class="text-[#fb2f38] text-sm mt-4 text-center hidden"></p>
    </div>
  </div>

  <!-- ============ APP SECTION ============ -->
  <div id="app-section" class="hidden">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-secondary-light">
      <div class="flex items-center justify-between px-4 h-14 max-w-7xl mx-auto">
        <button id="header-menu" class="flex items-center justify-center w-9 h-9 rounded-lg hover:bg-primary-light transition">
          <span class="material-symbols-outlined text-secondary">grid_view</span>
        </button>
        <h1 class="font-heading font-bold text-lg tracking-tight text-primary">Gundam TCG DB</h1>
        <button id="header-search" class="flex items-center justify-center w-9 h-9 rounded-lg hover:bg-primary-light transition">
          <span class="material-symbols-outlined text-secondary">search</span>
        </button>
      </div>
    </header>

    <!-- ===== DASHBOARD VIEW ===== -->
    <div id="view-dashboard" class="max-w-7xl mx-auto px-4 py-5 space-y-6">
      <!-- Stats Row -->
      <section id="dashboard-stats" class="grid grid-cols-2 gap-3">
        <div class="bg-white rounded-xl border border-secondary-light/60 p-4 relative overflow-hidden shadow-sm">
          <div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
          <p class="font-mono text-xs text-secondary uppercase tracking-wider mb-1">Totale Carte</p>
          <p id="stat-total-cards" class="font-heading font-bold text-2xl text-primary">—</p>
        </div>
        <div class="bg-white rounded-xl border border-secondary-light/60 p-4 relative overflow-hidden shadow-sm">
          <div class="absolute top-0 left-0 w-1 h-full bg-accent"></div>
          <p class="font-mono text-xs text-secondary uppercase tracking-wider mb-1">Carte Uniche</p>
          <p id="stat-unique-cards" class="font-heading font-bold text-2xl text-primary">—</p>
        </div>
      </section>

      <!-- Ultime Aggiunte (horizontal scroll) -->
      <section>
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-heading font-semibold text-sm uppercase tracking-wider text-secondary border-l-4 border-primary pl-3">Ultime Aggiunte</h2>
          <button id="latest-view-all" class="font-mono text-xs text-primary hover:text-accent transition flex items-center">
            Vedi tutte <span class="material-symbols-outlined text-sm ml-0.5">chevron_right</span>
          </button>
        </div>
        <div id="latest-scroll" class="flex overflow-x-auto gap-3 pb-2 hide-scrollbar snap-x snap-mandatory -mx-4 px-4">
          <div id="latest-empty" class="hidden w-full text-center py-8 text-secondary text-sm">Nessuna carta ancora.</div>
        </div>
      </section>

      <!-- Completamento Espansioni (vertical list) -->
      <section>
        <div class="flex items-center mb-3">
          <h2 class="font-heading font-semibold text-sm uppercase tracking-wider text-secondary border-l-4 border-primary pl-3">Completamento Espansioni</h2>
        </div>
        <div id="expansions-list" class="space-y-2">
          <div id="expansions-empty" class="hidden w-full text-center py-8 text-secondary text-sm">Nessuna espansione ancora.</div>
        </div>
      </section>
    </div>

    <!-- ===== COLLECTION VIEW ===== -->
    <div id="view-collection" class="hidden max-w-7xl mx-auto px-4 py-5">
      <div class="flex items-center gap-3 mb-5">
        <div class="flex gap-0">
          <button id="tab-cards" class="tab-btn active px-4 py-2 text-sm font-semibold border-b-2 transition text-primary border-primary" data-view="cards">Carte</button>
          <button id="tab-stats" class="tab-btn px-4 py-2 text-sm font-semibold border-b-2 transition text-secondary border-transparent hover:text-primary" data-view="stats">Statistiche</button>
        </div>
        <div class="flex-1"></div>
        <select id="col-set-filter" class="border border-secondary-light rounded-lg px-3 py-2 text-sm text-primary focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary min-w-[160px] bg-white"></select>
      </div>

      <div id="cards-content">
        <div class="mb-3">
          <input type="text" id="col-search" class="w-full border border-secondary-light rounded-lg px-4 py-2.5 text-sm text-primary placeholder-secondary/50 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary bg-white" placeholder="Cerca per nome o codice...">
        </div>
        <div id="variant-filters" class="mb-4">
          <div class="flex flex-wrap gap-2 items-center">
            <button class="variant-btn active" data-filter="base">Base</button>
            <button class="variant-btn" data-filter="altart">Alt Art</button>
            <button class="variant-btn" data-filter="resources">Risorse/Token</button>
            <span class="text-secondary text-xs mx-1">|</span>
            <button id="select-all-btn" class="text-xs text-primary hover:text-accent font-medium transition">Seleziona tutti</button>
            <button id="deselect-all-btn" class="text-xs text-secondary hover:text-primary font-medium transition">Deseleziona tutti</button>
          </div>
        </div>
        <div id="collection-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        <div id="collection-empty" class="hidden text-center py-16">
          <p class="text-secondary text-lg">Nessuna carta trovata</p>
        </div>
        <div id="collection-summary" class="mt-5 text-center text-secondary text-sm"></div>
      </div>

      <div id="collection-stats" class="hidden space-y-3">
        <div id="stats-content" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
      </div>
    </div>

    <!-- ===== PROFILE VIEW ===== -->
    <div id="view-profile" class="hidden max-w-7xl mx-auto px-4 py-5">
      <div class="bg-white rounded-2xl border border-[#e2e8f0] p-6 text-center shadow-sm">
        <div class="w-16 h-16 rounded-full bg-[#eef0f4] flex items-center justify-center mx-auto mb-3">
          <span class="material-symbols-outlined text-[#2c52b3]" style="font-size:36px">account_circle</span>
        </div>
        <p id="profile-email" class="text-[#2c52b3] font-semibold text-base"></p>
        <p class="text-[#5a5b6d] text-xs mt-1">Connesso</p>
      </div>
      <div class="mt-4">
        <button id="profile-logout" class="w-full bg-white border border-[#e2e8f0] rounded-xl py-3 text-sm font-semibold text-[#5a5b6d] hover:text-[#fb2f38] hover:border-[#fb2f38] transition shadow-sm">
          Esci
        </button>
      </div>
    </div>

    <!-- ===== Bottom Navigation ===== -->
    <nav id="bottom-nav" class="fixed bottom-0 w-full z-50 bg-white/95 backdrop-blur-xl border-t border-secondary-light shadow-[0_-2px_12px_rgba(0,0,0,0.06)]">
      <div class="flex justify-around items-center h-16 max-w-lg mx-auto">
        <button id="bottom-dashboard" class="bottom-nav-item active flex flex-col items-center justify-center flex-1 h-full">
          <span class="material-symbols-outlined mb-0.5" style="font-variation-settings:'FILL' 1">speed</span>
          <span class="font-mono text-[10px] uppercase tracking-wider">Dashboard</span>
        </button>
        <button id="bottom-collection" class="bottom-nav-item flex flex-col items-center justify-center flex-1 h-full">
          <span class="material-symbols-outlined mb-0.5">database</span>
          <span class="font-mono text-[10px] uppercase tracking-wider">Collezioni</span>
        </button>
        <button id="bottom-decks" class="bottom-nav-item flex flex-col items-center justify-center flex-1 h-full">
          <span class="material-symbols-outlined mb-0.5">style</span>
          <span class="font-mono text-[10px] uppercase tracking-wider">Decks</span>
        </button>
        <button id="bottom-profile" class="bottom-nav-item flex flex-col items-center justify-center flex-1 h-full">
          <span class="material-symbols-outlined mb-0.5">account_circle</span>
          <span class="font-mono text-[10px] uppercase tracking-wider">Profilo</span>
        </button>
      </div>
    </nav>
  </div>

  <!-- ============ BOTTOM SHEET ============ -->
  <div id="card-sheet" class="fixed inset-0 z-50 hidden" style="transition: opacity 0.2s ease;">
    <div class="absolute inset-0 bg-black/50" id="sheet-overlay"></div>
    <div id="sheet-panel" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl shadow-xl max-h-[95vh] overflow-y-auto translate-y-full" style="transition: transform 0.3s ease;">
      <!-- Handle visivo per trascinamento -->
      <div class="flex justify-center pt-2 pb-1 sticky top-0 bg-white z-10">
        <span class="w-10 h-1 bg-gray-300 rounded-full"></span>
      </div>

      <!-- Immagine grande -->
      <div class="flex justify-center -mt-1">
        <div class="w-44 aspect-[3/4] rounded-xl shadow-lg border-[3px] border-white overflow-hidden bg-gray-100">
          <img id="sheet-image" class="w-full h-full object-contain" src="">
        </div>
      </div>

      <!-- Nome + Codice + Set -->
      <div class="px-5 pt-3 text-center">
        <h2 id="sheet-name" class="text-lg font-bold text-primary"></h2>
        <p id="sheet-code" class="text-sm text-secondary"></p>
        <p id="sheet-set" class="text-xs text-secondary/60"></p>
      </div>

      <!-- Versioni alternative (dots) -->
      <div id="sheet-versions" class="flex justify-center items-center gap-2 mt-3"></div>

      <!-- CardTrader (bottone piccolo) -->
      <div class="px-5 mt-4 flex justify-center">
        <a id="sheet-cardtrader" href="#" target="_blank" rel="noopener"
           class="inline-flex items-center gap-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-lg px-3 py-1.5 text-xs font-semibold text-primary transition">
          <span>🛒</span> CardTrader
        </a>
      </div>

      <!-- Quantità con - / + -->
      <div class="px-5 mt-5 pb-8">
        <label class="block text-sm font-medium text-primary mb-3 text-center">Quantità</label>
        <div class="flex items-center justify-center gap-6">
          <button id="sheet-qty-minus" class="w-11 h-11 rounded-full bg-gray-100 hover:bg-gray-200 text-primary text-2xl font-bold flex items-center justify-center transition active:scale-90 select-none">−</button>
          <span id="sheet-qty-display" class="text-3xl font-bold text-primary w-10 text-center select-none">0</span>
          <button id="sheet-qty-plus" class="w-11 h-11 rounded-full bg-gray-100 hover:bg-gray-200 text-primary text-2xl font-bold flex items-center justify-center transition active:scale-90 select-none">+</button>
        </div>
        <p id="sheet-error" class="text-red-500 text-xs mt-3 text-center hidden"></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
