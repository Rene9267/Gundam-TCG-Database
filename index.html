<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gundam Collection Database</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gundam: {
              white: '#ffffff',
              surface: '#f8fafc',
              card: '#ffffff',
              blue: '#2563eb',
              'blue-hover': '#1d4ed8',
              yellow: '#eab308',
              'yellow-hover': '#ca8a04',
              red: '#ef4444',
              'red-hover': '#dc2626',
              dark: '#1e293b',
              muted: '#64748b'
            }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body class="bg-gundam-white text-gundam-dark min-h-screen">

  <!-- ============ SPLASH / AVVIA ============ -->
  <div id="splash-section" class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-blue-50 via-white to-yellow-50">
    <div class="text-center">
      <div class="mb-6">
        <h1 class="text-6xl font-bold tracking-wider text-gundam-yellow" style="text-shadow: 0 2px 8px rgba(234,179,8,0.3);">GUNDAM</h1>
        <p class="text-gundam-blue text-xl font-semibold -mt-1">CARD COLLECTION</p>
      </div>
      <button id="start-btn" class="bg-gundam-blue hover:bg-gundam-blue-hover text-white text-lg font-bold px-10 py-4 rounded-full shadow-lg transition hover:scale-105 active:scale-95">
        AVVIA
      </button>
      <p id="start-error" class="text-red-500 text-sm mt-4 hidden"></p>
    </div>
  </div>

  <!-- ============ APP SECTION ============ -->
  <div id="app-section" class="hidden">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm px-4 py-3 flex items-center justify-between border-b border-gray-200">
      <div class="flex items-center gap-3">
        <button id="hamburger-btn" class="w-9 h-9 flex flex-col items-center justify-center gap-1 rounded hover:bg-gray-100 transition">
          <span class="w-5 h-0.5 bg-gundam-dark rounded"></span>
          <span class="w-5 h-0.5 bg-gundam-dark rounded"></span>
          <span class="w-5 h-0.5 bg-gundam-dark rounded"></span>
        </button>
        <span class="text-2xl font-bold tracking-wider text-gundam-yellow">GUNDAM</span>
        <span class="text-gundam-blue text-sm font-semibold self-end pb-0.5">DB</span>
      </div>
      <button id="logout-btn" class="bg-gray-50 hover:bg-gray-100 text-gundam-muted hover:text-gundam-dark text-sm px-3 py-1.5 rounded border border-gray-200 transition">Esci</button>
    </nav>

    <!-- Sidebar overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/30 z-40 hidden" style="transition: opacity 0.2s ease;"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed top-0 left-0 z-50 h-full w-64 bg-white shadow-xl border-r border-gray-200 transform -translate-x-full transition-transform duration-200 ease-in-out">
      <div class="p-4 border-b border-gray-200 flex items-center justify-between">
        <span class="text-lg font-bold tracking-wider text-gundam-yellow">GUNDAM</span>
        <button id="sidebar-close" class="text-gray-400 hover:text-gundam-dark text-xl leading-none">&times;</button>
      </div>
      <nav class="p-3 flex flex-col gap-1">
        <button id="side-dashboard" class="side-nav active flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm font-semibold text-gundam-yellow bg-yellow-50 transition">
          <span class="text-lg">📊</span> Dashboard
        </button>
        <button id="side-collection" class="side-nav flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm font-semibold text-gundam-muted hover:text-gundam-dark hover:bg-gray-50 transition">
          <span class="text-lg">📇</span> Collezione
        </button>
      </nav>
      <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
        <p class="text-xs text-gundam-muted">Gundam Collection DB</p>
      </div>
    </aside>

    <!-- Floating Add Button -->
    <button id="fab-add" class="fixed bottom-6 right-6 z-30 w-14 h-14 bg-gundam-blue hover:bg-gundam-blue-hover rounded-full shadow-lg flex items-center justify-center text-2xl text-white font-bold transition hover:scale-110">+</button>

    <!-- ===== DASHBOARD VIEW ===== -->
    <div id="view-dashboard" class="max-w-6xl mx-auto px-4 py-6">
      <section>
        <h2 class="text-lg font-semibold text-gundam-dark mb-4 flex items-center gap-2">
          <span class="text-gundam-yellow">✦</span> Ultime Aggiunte
        </h2>
        <div id="latest-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        <div id="latest-empty" class="hidden text-center py-10">
          <p class="text-gundam-muted text-sm">Nessuna carta ancora. Aggiungi la prima!</p>
        </div>
      </section>

      <section class="mt-10">
        <h2 class="text-lg font-semibold text-gundam-dark mb-4 flex items-center gap-2">
          <span class="gundam-vfin"></span> Completamento Collezione
        </h2>
        <div class="completion-card">
          <div class="mb-4 flex flex-wrap gap-3 text-xs text-gundam-muted">
            <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-gundam-yellow inline-block"></span> ST — Starter Deck</span>
            <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-gundam-blue inline-block"></span> GD — Booster Pack</span>
          </div>
          <div id="completion-circles-wrapper" class="max-h-[520px] overflow-y-auto pr-2 -mr-2">
            <div id="completion-circles" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
          </div>
        </div>
      </section>
    </div>

    <!-- ===== COLLECTION VIEW ===== -->
    <div id="view-collection" class="hidden max-w-6xl mx-auto px-4 py-6">
      <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <div class="flex-1">
          <input type="text" id="col-search" class="w-full border border-gray-300 rounded px-4 py-2.5 text-gundam-dark placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gundam-blue focus:border-transparent" placeholder="Cerca per nome o codice...">
        </div>
        <select id="col-set-filter" class="border border-gray-300 rounded px-4 py-2.5 text-gundam-dark focus:outline-none focus:ring-2 focus:ring-gundam-blue focus:border-transparent min-w-[180px] bg-white">
          <option value="">Tutte le espansioni</option>
        </select>
      </div>

      <div id="collection-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
      <div id="collection-empty" class="hidden text-center py-16">
        <p class="text-gundam-muted text-lg">Nessuna carta trovata</p>
      </div>
      <div id="collection-summary" class="mt-6 text-center text-gundam-muted text-sm"></div>
    </div>
  </div>

  <!-- ============ CARD MODAL ============ -->
  <div id="card-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden px-4">
    <div class="bg-white rounded-lg w-full max-w-md p-6 shadow-xl max-h-[90vh] overflow-y-auto border border-gray-200">
      <div class="flex justify-between items-center mb-4">
        <h2 id="modal-title" class="text-xl font-bold text-gundam-dark">Aggiungi Carta</h2>
        <button id="modal-close" class="text-gray-400 hover:text-gundam-dark text-2xl leading-none">&times;</button>
      </div>
      <form id="card-form">
        <div class="mb-3">
          <label class="block text-sm text-gundam-muted mb-1">Nome Carta *</label>
          <input type="text" id="field-card-name" class="w-full border border-gray-300 rounded px-3 py-2 text-gundam-dark focus:outline-none focus:ring-2 focus:ring-gundam-blue focus:border-transparent" required>
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gundam-muted mb-1">Codice Carta *</label>
          <input type="text" id="field-card-code" class="w-full border border-gray-300 rounded px-3 py-2 text-gundam-dark focus:outline-none focus:ring-2 focus:ring-gundam-blue focus:border-transparent" required>
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gundam-muted mb-1">Espansione (Set)</label>
          <input type="text" id="field-set-name" class="w-full border border-gray-300 rounded px-3 py-2 text-gundam-dark focus:outline-none focus:ring-2 focus:ring-gundam-blue focus:border-transparent">
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gundam-muted mb-1">Rarità</label>
          <select id="field-rarity" class="w-full border border-gray-300 rounded px-3 py-2 text-gundam-dark focus:outline-none focus:ring-2 focus:ring-gundam-blue focus:border-transparent bg-white">
            <option value="">— Seleziona —</option>
            <option value="Common">Common</option>
            <option value="Uncommon">Uncommon</option>
            <option value="Rare">Rare</option>
            <option value="Super Rare">Super Rare</option>
            <option value="Secret Rare">Secret Rare</option>
            <option value="Promo">Promo</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gundam-muted mb-1">Quantità</label>
          <input type="number" id="field-quantity" class="w-full border border-gray-300 rounded px-3 py-2 text-gundam-dark focus:outline-none focus:ring-2 focus:ring-gundam-blue focus:border-transparent" value="1" min="1">
        </div>
        <div class="mb-4">
          <label class="block text-sm text-gundam-muted mb-1">URL Immagine</label>
          <input type="url" id="field-image-url" class="w-full border border-gray-300 rounded px-3 py-2 text-gundam-dark placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gundam-blue focus:border-transparent" placeholder="https://...">
        </div>
        <p id="form-error" class="text-red-500 text-sm mb-3 hidden"></p>
        <div class="flex gap-3">
          <button type="button" id="modal-cancel" class="flex-1 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded py-2 transition text-gundam-muted">Annulla</button>
          <button type="submit" id="modal-save" class="flex-1 bg-gundam-blue hover:bg-gundam-blue-hover rounded py-2 font-semibold transition text-white shadow-sm">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>
</body>
</html>
