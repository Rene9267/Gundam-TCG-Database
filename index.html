<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gundam Collection Database</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gundam: {
              navy: '#0a0e27',
              surface: '#151a3a',
              card: '#1e2347',
              blue: '#3b82f6',
              'blue-hover': '#2563eb',
              yellow: '#eab308',
              'yellow-hover': '#ca8a04',
              white: '#f8fafc',
              muted: '#94a3b8'
            }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body class="bg-gundam-navy text-gundam-white min-h-screen">

  <!-- ============ AUTH SECTION ============ -->
  <div id="auth-section" class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <h1 class="text-5xl font-bold tracking-wider text-gundam-yellow">GUNDAM</h1>
        <p class="text-gundam-blue text-lg font-semibold -mt-1">CARD COLLECTION</p>
      </div>
      <div class="bg-gundam-surface rounded-lg p-6 shadow-lg border border-gundam-blue/20">
        <h2 class="text-center font-semibold text-gundam-white mb-4">Accedi</h2>
        <form id="auth-form">
          <div>
            <label class="block text-sm text-gundam-muted mb-1">Email</label>
            <input type="email" id="auth-email" class="w-full bg-gundam-navy border border-gundam-blue/30 rounded px-3 py-2.5 text-gundam-white placeholder-gundam-muted/50 focus:outline-none focus:ring-2 focus:ring-gundam-blue" placeholder="email@esempio.com" required>
          </div>
          <div class="mt-3">
            <label class="block text-sm text-gundam-muted mb-1">Password</label>
            <input type="password" id="auth-password" class="w-full bg-gundam-navy border border-gundam-blue/30 rounded px-3 py-2.5 text-gundam-white placeholder-gundam-muted/50 focus:outline-none focus:ring-2 focus:ring-gundam-blue" placeholder="••••••••" required>
          </div>
          <p id="auth-error" class="text-red-400 text-sm mt-2 hidden"></p>
          <button type="submit" id="auth-submit" class="w-full mt-4 bg-gundam-blue hover:bg-gundam-blue-hover rounded py-2.5 font-semibold transition text-white">Accedi</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ============ DASHBOARD SECTION ============ -->
  <div id="dashboard-section" class="hidden">
    <!-- Navbar -->
    <nav class="bg-gundam-surface shadow-lg px-4 py-3 flex items-center justify-between border-b border-gundam-blue/20">
      <div class="flex items-center gap-2">
        <span class="text-2xl font-bold tracking-wider text-gundam-yellow">GUNDAM</span>
        <span class="text-gundam-blue text-sm font-semibold self-end pb-0.5">DB</span>
      </div>
      <div class="flex items-center gap-4">
        <span id="user-email" class="text-sm text-gundam-muted hidden sm:inline"></span>
        <button id="logout-btn" class="bg-gundam-navy hover:bg-gundam-blue/20 text-gundam-muted hover:text-gundam-white text-sm px-3 py-1.5 rounded border border-gundam-blue/20 transition">Esci</button>
      </div>
    </nav>

    <!-- Navigation Tabs -->
    <div class="bg-gundam-surface border-b border-gundam-blue/10">
      <div class="max-w-6xl mx-auto px-4 flex">
        <button id="nav-dashboard" class="nav-tab active px-5 py-3 text-sm font-semibold border-b-2 border-gundam-yellow text-gundam-yellow">Dashboard</button>
        <button id="nav-collection" class="nav-tab px-5 py-3 text-sm font-semibold border-b-2 border-transparent text-gundam-muted hover:text-gundam-white">Collezione</button>
      </div>
    </div>

    <!-- Floating Add Button -->
    <button id="fab-add" class="fixed bottom-6 right-6 z-40 w-14 h-14 bg-gundam-blue hover:bg-gundam-blue-hover rounded-full shadow-lg flex items-center justify-center text-2xl text-white font-bold transition hover:scale-110">+</button>

    <!-- ===== DASHBOARD VIEW ===== -->
    <div id="view-dashboard" class="max-w-6xl mx-auto px-4 py-6">
      <!-- Ultime Aggiunte -->
      <section>
        <h2 class="text-lg font-semibold text-gundam-white mb-4 flex items-center gap-2">
          <span class="text-gundam-yellow">✦</span> Ultime Aggiunte
        </h2>
        <div id="latest-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <!-- rendered by JS -->
        </div>
        <div id="latest-empty" class="hidden text-center py-10">
          <p class="text-gundam-muted">Nessuna carta ancora. Aggiungi la prima!</p>
        </div>
      </section>

      <!-- Completamento Collezione -->
      <section class="mt-10">
        <h2 class="text-lg font-semibold text-gundam-white mb-4 flex items-center gap-2">
          <span class="text-gundam-yellow">◆</span> Completamento Collezione
        </h2>
        <div id="completion-circles" class="flex flex-wrap gap-6 justify-center sm:justify-start">
          <!-- rendered by JS -->
        </div>
        <div id="completion-empty" class="hidden text-center py-10">
          <p class="text-gundam-muted">Aggiungi carte per vedere le statistiche di completamento.</p>
        </div>
      </section>
    </div>

    <!-- ===== COLLECTION VIEW ===== -->
    <div id="view-collection" class="hidden max-w-6xl mx-auto px-4 py-6">
      <!-- Filter -->
      <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <div class="flex-1">
          <input type="text" id="col-search" class="w-full bg-gundam-surface border border-gundam-blue/30 rounded px-4 py-2.5 text-gundam-white placeholder-gundam-muted/50 focus:outline-none focus:ring-2 focus:ring-gundam-blue" placeholder="Cerca per nome o codice...">
        </div>
        <select id="col-set-filter" class="bg-gundam-surface border border-gundam-blue/30 rounded px-4 py-2.5 text-gundam-white focus:outline-none focus:ring-2 focus:ring-gundam-blue min-w-[180px]">
          <option value="">Tutte le espansioni</option>
        </select>
      </div>

      <!-- Collection Grid -->
      <div id="collection-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <!-- rendered by JS -->
      </div>
      <div id="collection-empty" class="hidden text-center py-16">
        <p class="text-gundam-muted text-lg">Nessuna carta trovata</p>
      </div>

      <!-- Summary -->
      <div id="collection-summary" class="mt-6 text-center text-gundam-muted text-sm"></div>
    </div>
  </div>

  <!-- ============ CARD MODAL ============ -->
  <div id="card-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden px-4">
    <div class="bg-gundam-surface rounded-lg w-full max-w-md p-6 shadow-2xl max-h-[90vh] overflow-y-auto border border-gundam-blue/20">
      <div class="flex justify-between items-center mb-4">
        <h2 id="modal-title" class="text-xl font-bold text-gundam-white">Aggiungi Carta</h2>
        <button id="modal-close" class="text-gundam-muted hover:text-gundam-white text-2xl leading-none">&times;</button>
      </div>
      <form id="card-form">
        <div class="mb-3">
          <label class="block text-sm text-gundam-muted mb-1">Nome Carta *</label>
          <input type="text" id="field-card-name" class="w-full bg-gundam-navy border border-gundam-blue/30 rounded px-3 py-2 text-gundam-white focus:outline-none focus:ring-2 focus:ring-gundam-blue" required>
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gundam-muted mb-1">Codice Carta *</label>
          <input type="text" id="field-card-code" class="w-full bg-gundam-navy border border-gundam-blue/30 rounded px-3 py-2 text-gundam-white focus:outline-none focus:ring-2 focus:ring-gundam-blue" required>
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gundam-muted mb-1">Espansione (Set)</label>
          <input type="text" id="field-set-name" class="w-full bg-gundam-navy border border-gundam-blue/30 rounded px-3 py-2 text-gundam-white focus:outline-none focus:ring-2 focus:ring-gundam-blue">
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gundam-muted mb-1">Rarità</label>
          <select id="field-rarity" class="w-full bg-gundam-navy border border-gundam-blue/30 rounded px-3 py-2 text-gundam-white focus:outline-none focus:ring-2 focus:ring-gundam-blue">
            <option value="">— Seleziona —</option>
            <option value="Common">Common</option>
            <option value="Uncommon">Uncommon</option>
            <option value="Rare">Rare</option>
            <option value="Super Rare">Super Rare</option>
            <option value="Secret Rare">Secret Rare</option>
            <option value="Promo">Promo</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gundam-muted mb-1">Quantità</label>
          <input type="number" id="field-quantity" class="w-full bg-gundam-navy border border-gundam-blue/30 rounded px-3 py-2 text-gundam-white focus:outline-none focus:ring-2 focus:ring-gundam-blue" value="1" min="1">
        </div>
        <div class="mb-4">
          <label class="block text-sm text-gundam-muted mb-1">URL Immagine</label>
          <input type="url" id="field-image-url" class="w-full bg-gundam-navy border border-gundam-blue/30 rounded px-3 py-2 text-gundam-white placeholder-gundam-muted/50 focus:outline-none focus:ring-2 focus:ring-gundam-blue" placeholder="https://...">
        </div>
        <p id="form-error" class="text-red-400 text-sm mb-3 hidden"></p>
        <div class="flex gap-3">
          <button type="button" id="modal-cancel" class="flex-1 bg-gundam-navy hover:bg-gundam-blue/20 border border-gundam-blue/30 rounded py-2 transition text-gundam-muted">Annulla</button>
          <button type="submit" id="modal-save" class="flex-1 bg-gundam-blue hover:bg-gundam-blue-hover rounded py-2 font-semibold transition text-white">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
