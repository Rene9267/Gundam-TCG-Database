<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gundam Collection Database</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gundam: {
              white: '#ffffff',
              surface: '#f8fafc',
              card: '#ffffff',
              blue: '#2563eb',
              'blue-hover': '#1d4ed8',
              yellow: '#eab308',
              'yellow-hover': '#ca8a04',
              red: '#ef4444',
              'red-hover': '#dc2626',
              dark: '#1e293b',
              muted: '#64748b'
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body class="bg-gundam-white text-gundam-dark min-h-screen">

  <!-- ============ SPLASH / AVVIA ============ -->
  <div id="splash-section" class="min-h-screen flex items-center justify-center px-4 bg-gradient-to-br from-blue-50 via-white to-yellow-50">
    <div class="text-center">
      <div class="mb-6">
        <h1 class="text-6xl font-bold tracking-wider text-gundam-yellow" style="text-shadow: 0 2px 8px rgba(234,179,8,0.3);">GUNDAM</h1>
        <p class="text-gundam-blue text-xl font-semibold -mt-1">CARD COLLECTION</p>
      </div>
      <button id="start-btn" class="bg-gundam-blue hover:bg-gundam-blue-hover text-white text-lg font-bold px-10 py-4 rounded-full shadow-lg transition hover:scale-105 active:scale-95">
        AVVIA
      </button>
      <p id="start-error" class="text-red-500 text-sm mt-4 hidden"></p>
    </div>
  </div>

  <!-- ============ APP SECTION ============ -->
  <div id="app-section" class="hidden">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm px-4 py-3 flex items-center justify-between border-b border-gray-200">
      <div class="flex items-center gap-3">
        <button id="hamburger-btn" class="w-9 h-9 flex flex-col items-center justify-center gap-1 rounded hover:bg-gray-100 transition">
          <span class="w-5 h-0.5 bg-gundam-dark rounded"></span>
          <span class="w-5 h-0.5 bg-gundam-dark rounded"></span>
          <span class="w-5 h-0.5 bg-gundam-dark rounded"></span>
        </button>
        <span class="text-2xl font-bold tracking-wider text-gundam-yellow">GUNDAM</span>
        <span class="text-gundam-blue text-sm font-semibold self-end pb-0.5">DB</span>
      </div>
      <button id="logout-btn" class="bg-gray-50 hover:bg-gray-100 text-gundam-muted hover:text-gundam-dark text-sm px-3 py-1.5 rounded border border-gray-200 transition">Esci</button>
    </nav>

    <!-- Sidebar overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/30 z-40 hidden" style="transition: opacity 0.2s ease;"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed top-0 left-0 z-50 h-full w-64 bg-white shadow-xl border-r border-gray-200 transform -translate-x-full transition-transform duration-200 ease-in-out">
      <div class="p-4 border-b border-gray-200 flex items-center justify-between">
        <span class="text-lg font-bold tracking-wider text-gundam-yellow">GUNDAM</span>
        <button id="sidebar-close" class="text-gray-400 hover:text-gundam-dark text-xl leading-none">&times;</button>
      </div>
      <nav class="p-3 flex flex-col gap-1">
        <button id="side-dashboard" class="side-nav active flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm font-semibold text-gundam-yellow bg-yellow-50 transition">
          <span class="text-lg">📊</span> Dashboard
        </button>
        <button id="side-collection" class="side-nav flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm font-semibold text-gundam-muted hover:text-gundam-dark hover:bg-gray-50 transition">
          <span class="text-lg">📇</span> Collezione
        </button>
      </nav>
      <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
        <p class="text-xs text-gundam-muted">Gundam Collection DB</p>
      </div>
    </aside>

    <!-- ===== DASHBOARD VIEW ===== -->
    <div id="view-dashboard" class="max-w-6xl mx-auto px-4 py-6">
      <section>
        <h2 class="text-lg font-semibold text-gundam-dark mb-4 flex items-center gap-2">
          <span class="text-gundam-yellow">✦</span> Ultime Aggiunte
        </h2>
        <div id="latest-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        <div id="latest-empty" class="hidden text-center py-10">
          <p class="text-gundam-muted text-sm">Nessuna carta ancora. Aggiungi la prima!</p>
        </div>
      </section>

      <section class="mt-10">
        <h2 class="text-lg font-semibold text-gundam-dark mb-4 flex items-center gap-2">
          <span class="gundam-vfin"></span> Completamento Collezione
        </h2>
        <div class="completion-card">
          <div class="mb-4 flex flex-wrap gap-3 text-xs text-gundam-muted">
            <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-gundam-yellow inline-block"></span> ST — Starter Deck</span>
            <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-gundam-blue inline-block"></span> GD — Booster Pack</span>
          </div>
          <div id="completion-circles-wrapper" class="max-h-[520px] overflow-y-auto pr-2 -mr-2">
            <div id="completion-circles" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
          </div>
        </div>
      </section>
    </div>

    <!-- ===== COLLECTION VIEW ===== -->
    <div id="view-collection" class="hidden max-w-6xl mx-auto px-4 py-6">
      <!-- Row 1: Tabs + Set Filter -->
      <div class="flex items-center gap-3 mb-6">
        <div id="collection-tabs" class="flex gap-0">
          <button id="tab-cards" class="tab-btn active px-5 py-2.5 text-sm font-semibold border-b-2 transition text-gundam-blue border-gundam-blue" data-view="cards">Carte</button>
          <button id="tab-stats" class="tab-btn px-5 py-2.5 text-sm font-semibold border-b-2 transition text-gundam-muted border-transparent hover:text-gundam-dark" data-view="stats">Statistiche</button>
        </div>
        <div class="flex-1"></div>
        <select id="col-set-filter" class="border border-gray-300 rounded px-4 py-2.5 text-gundam-dark focus:outline-none focus:ring-2 focus:ring-gundam-blue focus:border-transparent min-w-[180px] bg-white"></select>
      </div>

      <!-- Cards content (solo visibile in tab Carte) -->
      <div id="cards-content">
        <div class="mb-4">
          <input type="text" id="col-search" class="w-full border border-gray-300 rounded px-4 py-2.5 text-gundam-dark placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gundam-blue focus:border-transparent" placeholder="Cerca per nome o codice...">
        </div>

        <!-- Variant filter toggles (solo visibili con set selezionato) -->
        <div id="variant-filters" class="hidden mb-4">
          <div class="flex flex-wrap gap-2 items-center">
            <button class="variant-btn active" data-filter="base">Base</button>
            <button class="variant-btn" data-filter="altart">Alt Art</button>
            <button class="variant-btn" data-filter="resources">Risorse/Token</button>
            <span class="text-gundam-muted text-xs mx-1">|</span>
            <button id="select-all-btn" class="text-xs text-gundam-blue hover:text-gundam-blue-hover font-medium transition">Seleziona tutti</button>
            <button id="deselect-all-btn" class="text-xs text-gundam-muted hover:text-gundam-dark font-medium transition">Deseleziona tutti</button>
          </div>
        </div>

        <div id="collection-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        <div id="collection-empty" class="hidden text-center py-16">
          <p class="text-gundam-muted text-lg">Nessuna carta trovata</p>
        </div>
        <div id="collection-summary" class="mt-6 text-center text-gundam-muted text-sm"></div>
      </div>

      <!-- Statistics view (solo visibile in tab Statistiche) -->
      <div id="collection-stats" class="hidden space-y-3">
        <div id="stats-content" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
      </div>
    </div>
  </div>

  <!-- ============ BOTTOM SHEET ============ -->
  <div id="card-sheet" class="fixed inset-0 z-50 hidden" style="transition: opacity 0.2s ease;">
    <div class="absolute inset-0 bg-black/50" id="sheet-overlay"></div>
    <div id="sheet-panel" class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl shadow-xl max-h-[95vh] overflow-y-auto translate-y-full" style="transition: transform 0.3s ease;">
      <!-- Handle visivo per trascinamento -->
      <div class="flex justify-center pt-2 pb-1 sticky top-0 bg-white z-10">
        <span class="w-10 h-1 bg-gray-300 rounded-full"></span>
      </div>

      <!-- Immagine grande -->
      <div class="flex justify-center -mt-1">
        <div class="w-44 aspect-[3/4] rounded-xl shadow-lg border-[3px] border-white overflow-hidden bg-gray-100">
          <img id="sheet-image" class="w-full h-full object-contain" src="">
        </div>
      </div>

      <!-- Nome + Codice + Set -->
      <div class="px-5 pt-3 text-center">
        <h2 id="sheet-name" class="text-lg font-bold text-gundam-dark"></h2>
        <p id="sheet-code" class="text-sm text-gundam-muted"></p>
        <p id="sheet-set" class="text-xs text-gundam-muted/60"></p>
      </div>

      <!-- Versioni alternative (dots) -->
      <div id="sheet-versions" class="flex justify-center items-center gap-2 mt-3"></div>

      <!-- CardTrader (bottone piccolo) -->
      <div class="px-5 mt-4 flex justify-center">
        <a id="sheet-cardtrader" href="#" target="_blank" rel="noopener"
           class="inline-flex items-center gap-1.5 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-lg px-3 py-1.5 text-xs font-semibold text-gundam-dark transition">
          <span>🛒</span> CardTrader
        </a>
      </div>

      <!-- Quantità con - / + -->
      <div class="px-5 mt-5 pb-8">
        <label class="block text-sm font-medium text-gundam-dark mb-3 text-center">Quantità</label>
        <div class="flex items-center justify-center gap-6">
          <button id="sheet-qty-minus" class="w-11 h-11 rounded-full bg-gray-100 hover:bg-gray-200 text-gundam-dark text-2xl font-bold flex items-center justify-center transition active:scale-90 select-none">−</button>
          <span id="sheet-qty-display" class="text-3xl font-bold text-gundam-dark w-10 text-center select-none">0</span>
          <button id="sheet-qty-plus" class="w-11 h-11 rounded-full bg-gray-100 hover:bg-gray-200 text-gundam-dark text-2xl font-bold flex items-center justify-center transition active:scale-90 select-none">+</button>
        </div>
        <p id="sheet-error" class="text-red-500 text-xs mt-3 text-center hidden"></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
