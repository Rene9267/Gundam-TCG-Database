<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gundam Collection Database</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <!-- ============ AUTH SECTION ============ -->
  <div id="auth-section" class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-red-500">GundamDB</h1>
        <p class="text-gray-400 mt-2">Collezione Carte TCG</p>
      </div>
      <div class="bg-gray-800 rounded-lg p-6 shadow-lg">
        <div class="flex mb-4">
          <button id="auth-login-tab" class="flex-1 py-2 text-center font-semibold border-b-2 border-red-500 text-white">Accedi</button>
          <button id="auth-register-tab" class="flex-1 py-2 text-center font-semibold border-b-2 border-gray-600 text-gray-400">Registrati</button>
        </div>
        <form id="auth-form">
          <div id="auth-email-field">
            <label class="block text-sm text-gray-300 mb-1">Email</label>
            <input type="email" id="auth-email" class="w-full bg-gray-700 rounded px-3 py-2 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="email@esempio.com" required>
          </div>
          <div class="mt-3">
            <label class="block text-sm text-gray-300 mb-1">Password</label>
            <input type="password" id="auth-password" class="w-full bg-gray-700 rounded px-3 py-2 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="••••••••" required>
          </div>
          <p id="auth-error" class="text-red-400 text-sm mt-2 hidden"></p>
          <button type="submit" id="auth-submit" class="w-full mt-4 bg-red-600 hover:bg-red-700 rounded py-2 font-semibold transition">Accedi</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ============ DASHBOARD SECTION ============ -->
  <div id="dashboard-section" class="hidden">
    <!-- Navbar -->
    <nav class="bg-gray-800 shadow-lg px-4 py-3 flex items-center justify-between">
      <h1 class="text-xl font-bold text-red-500">GundamDB</h1>
      <div class="flex items-center gap-3">
        <span id="user-email" class="text-sm text-gray-300 hidden sm:inline"></span>
        <button id="logout-btn" class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1.5 rounded transition">Esci</button>
      </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-6">
      <!-- Search + Add -->
      <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <input type="text" id="search-input" class="flex-1 bg-gray-800 border border-gray-700 rounded px-4 py-2.5 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Cerca per nome o codice carta...">
        <button id="add-card-btn" class="bg-red-600 hover:bg-red-700 px-5 py-2.5 rounded font-semibold transition whitespace-nowrap">+ Aggiungi Carta</button>
      </div>

      <!-- Card Grid -->
      <div id="card-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <!-- Cards will be rendered here by JS -->
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden text-center py-16">
        <p class="text-6xl mb-4">📦</p>
        <p class="text-gray-400 text-lg">Nessuna carta trovata</p>
        <p id="empty-sub" class="text-gray-500 text-sm mt-1">Aggiungi la tua prima carta!</p>
      </div>
    </div>
  </div>

  <!-- ============ CARD MODAL ============ -->
  <div id="card-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden px-4">
    <div class="bg-gray-800 rounded-lg w-full max-w-md p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 id="modal-title" class="text-xl font-bold">Aggiungi Carta</h2>
        <button id="modal-close" class="text-gray-400 hover:text-white text-2xl leading-none">&times;</button>
      </div>
      <form id="card-form">
        <div class="mb-3">
          <label class="block text-sm text-gray-300 mb-1">Nome Carta *</label>
          <input type="text" id="field-card-name" class="w-full bg-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-red-500" required>
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gray-300 mb-1">Codice Carta *</label>
          <input type="text" id="field-card-code" class="w-full bg-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-red-500" required>
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gray-300 mb-1">Espansione (Set)</label>
          <input type="text" id="field-set-name" class="w-full bg-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gray-300 mb-1">Rarità</label>
          <select id="field-rarity" class="w-full bg-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-red-500">
            <option value="">— Seleziona —</option>
            <option value="Common">Common</option>
            <option value="Uncommon">Uncommon</option>
            <option value="Rare">Rare</option>
            <option value="Super Rare">Super Rare</option>
            <option value="Secret Rare">Secret Rare</option>
            <option value="Promo">Promo</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="block text-sm text-gray-300 mb-1">Quantità</label>
          <input type="number" id="field-quantity" class="w-full bg-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-red-500" value="1" min="1">
        </div>
        <div class="mb-4">
          <label class="block text-sm text-gray-300 mb-1">URL Immagine</label>
          <input type="url" id="field-image-url" class="w-full bg-gray-700 rounded px-3 py-2 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="https://...">
        </div>
        <p id="form-error" class="text-red-400 text-sm mb-3 hidden"></p>
        <div class="flex gap-3">
          <button type="button" id="modal-cancel" class="flex-1 bg-gray-600 hover:bg-gray-500 rounded py-2 transition">Annulla</button>
          <button type="submit" id="modal-save" class="flex-1 bg-red-600 hover:bg-red-700 rounded py-2 font-semibold transition">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
